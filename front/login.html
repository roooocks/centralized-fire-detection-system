<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - G1B4 중앙 집중 화재 감지기</title>
    <style>
        :root {
            --bg-color: #F3F6F9;
            --primary: #8CA1B6;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --white: #FFFFFF;
            --border: #E0E6ED;
            --btn-red: #e51400;
            --btn-red-hover: #c91200;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: var(--bg-color); color: var(--text-dark); }
        .login-wrapper { background-color: var(--white); width: 100%; max-width: 400px; padding: 50px 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .login-wrapper h1 { font-size: 32px; font-weight: 800; color: var(--text-dark); margin-bottom: 5px; letter-spacing: 1px; }
        .login-wrapper p { font-size: 15px; color: var(--text-light); margin-bottom: 40px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group input { width: 100%; padding: 15px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; background-color: #FAFCFF; transition: all 0.3s ease; }
        .input-group input:focus { outline: none; border-color: var(--primary); background-color: var(--white); box-shadow: 0 0 0 3px rgba(140, 161, 182, 0.1); }
        .input-group input::placeholder { color: #AAB7C4; }
        .login-btn { width: 100%; padding: 16px; margin-top: 10px; font-size: 16px; font-weight: 600; color: var(--white); background-color: var(--btn-red); border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s ease; }
        .login-btn:hover { background-color: var(--btn-red-hover); }
        .error-message { min-height: 20px; margin-top: 15px; font-size: 13px; color: #e51400; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <h1>G1B4</h1>
        <p>중앙 집중 화재 감지 시스템</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <input type="text" id="userId" placeholder="아이디 입력" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="userPwd" placeholder="비밀번호 입력" required>
            </div>
            <button type="submit" class="login-btn">로그인</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';

        async function handleLogin(event) {
            event.preventDefault();

            const userId = document.getElementById('userId').value.trim();
            const userPwd = document.getElementById('userPwd').value;
            const errorEl = document.getElementById('errorMessage');
            errorEl.innerText = '';

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, password: userPwd })
                });

                const result = await res.json();

                if (!res.ok || result.success === false) {
                    throw new Error(result.message || '로그인 실패');
                }

                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('loginUser', JSON.stringify(result.data || {}));
                window.location.href = 'index.html';
            } catch (err) {
                errorEl.innerText = err.message;
            }
        }
    </script>
</body>
</html>
